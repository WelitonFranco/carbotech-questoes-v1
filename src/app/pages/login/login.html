<div class="container">
  <h1>Entrar</h1>

  <form class="form" (ngSubmit)="entrar()">
    <input
      type="email"
      name="email"
      placeholder="E-mail"
      [(ngModel)]="email"
      autocomplete="email"
      aria-label="E-mail"
    />

    <input
      type="password"
      name="senha"
      placeholder="Senha"
      [(ngModel)]="senha"
      autocomplete="current-password"
      aria-label="Senha"
    />

    <p class="error-message" *ngIf="mensagemErro">{{ mensagemErro }}</p>

    <button type="submit" class="btn" [disabled]="loading">
      {{ loading ? 'Entrando...' : 'Entrar' }}
    </button>
  </form>

  <div class="links">
    <a routerLink="/forgot-password">Esqueci minha senha</a>
    <a routerLink="/register">Criar conta</a>
  </div>
</div>
