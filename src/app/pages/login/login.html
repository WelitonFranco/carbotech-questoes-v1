<section class="container">
  <div class="auth-layout">
    <aside class="auth-highlight" aria-hidden="true">
      <img src="/coal.png" alt="" class="highlight-logo" />
      <h2>Estude com consistência</h2>
      <p>
        Acompanhe seu desempenho e mantenha sua rotina diária de questões com
        uma experiência mais fluida.
      </p>
    </aside>

    <div class="panel">
      <img src="/coal.png" alt="Logo CarboTech" class="logo" />
      <h1>Entrar</h1>
      <p class="subtitulo">Acesse sua conta para continuar seus estudos.</p>

      <form class="form" (ngSubmit)="entrar()">
        <input
          type="email"
          name="email"
          placeholder="E-mail"
          [(ngModel)]="email"
          autocomplete="email"
          aria-label="E-mail"
        />

        <input
          type="password"
          name="senha"
          placeholder="Senha"
          [(ngModel)]="senha"
          autocomplete="current-password"
          aria-label="Senha"
        />

        <p class="error-message" *ngIf="mensagemErro">{{ mensagemErro }}</p>

        <button type="submit" class="btn" [disabled]="loading">
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <div class="links">
        <a routerLink="/forgot-password">Esqueci minha senha</a>
        <a routerLink="/register">Criar conta</a>
      </div>
    </div>
  </div>
</section>
